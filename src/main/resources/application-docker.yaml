spring:
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/ecommerce_db
    username: ${USERNAME_DATABASE}
    password: ${PASSWORD_DATABASE}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: host.docker.internal
      port: 6379

  rabbitmq:
    host: host.docker.internal
    port: 5672
    username: ${USER_MQ}
    password: ${PASSWORD_MQ}