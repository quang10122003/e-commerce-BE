spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db
    username: ${USERNAME_DATABASE}
    password: ${PASSWORD_DATABASE}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: ${USER_MQ}
    password: ${PASSWORD_MQ}